<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-8">

    <div class="max-w-3xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-indigo-600 mb-2">Family Calendar Agent 🤖</h1>
            <p class="text-slate-500">Autonomous inbox scanning and event extraction.</p>
        </header>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
            
            <div class="flex items-center justify-between border-b border-slate-100 pb-6 mb-6">
                <div>
                    <h2 class="text-xl font-bold">Google Connection</h2>
                    <p class="text-sm text-slate-500">Link your Gmail & Calendar</p>
                </div>
                <button onclick="window.location.href='/login?user_id=a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d'" 
                        class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-6 rounded-lg transition-colors">
                    Connect Account
                </button>
            </div>

            <div class="bg-slate-50 rounded-xl p-6 border border-slate-200 text-center">
                <h3 class="font-semibold mb-2">Manual Agent Override</h3>
                <p class="text-sm text-slate-500 mb-4">Force the AI to scan your inbox right now instead of waiting for the background schedule.</p>
                
                <button onclick="triggerSweep()" 
                        class="bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-2 px-6 rounded-lg transition-colors shadow-sm">
                    🚀 Run Inbox Sweep
                </button>
                <p id="sweep-status" class="text-sm font-medium mt-3 text-indigo-600 hidden">Sweep initiated! Check logs.</p>
            </div>

        </div>
    </div>

    <script>
        async function triggerSweep() {
            document.getElementById('sweep-status').classList.remove('hidden');
            try {
                await fetch('/api/agent/trigger-sweep', { method: 'POST' });
            } catch (error) {
                console.error("Error triggering sweep:", error);
            }
        }
    </script>
</body>
</html>
