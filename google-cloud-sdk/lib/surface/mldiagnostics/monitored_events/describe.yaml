- release_tracks:
  - ALPHA
  auto_generated: false
  help_text:
    brief: Display the details of a specific monitored event.
    description: Display the details of a specific monitored event.
    examples: |-
      To get details of a specific monitored event, run:

          $ {command} abc-123-def-456 --location=us-central1 --machine-learning-run=my-run-123 --format=json

          Sample output:
          ```
            {
              "analyzerInsightFound": true,
              "displayName": "performance-degradation-event",
              "name": "projects/PROJECT_ID/locations/us-central1/machineLearningRuns/my-run-123/monitoredEvents/abc-123-def-456",
              "startTime": "2026-05-01T12:00:00Z",
              "type": "PERFORMANCE_DEGRADATION"
            }
          ```
  arguments:
    params:
    - help_text: |-
        projects/{project}/locations/{location}/machineLearningRuns/{machineLearningRun}/monitoredEvents/{monitoredEvent}
      is_positional: true
      is_primary_resource: true
      resource_spec: !REF googlecloudsdk.command_lib.mldiagnostics.machine_learning_run.v1alpha_resources:projects_locations_machine_learning_runs_monitored_events
      required: true
  request:
    api_version: v1alpha
    collection:
    - hypercomputecluster.projects.locations.machineLearningRuns.monitoredEvents
