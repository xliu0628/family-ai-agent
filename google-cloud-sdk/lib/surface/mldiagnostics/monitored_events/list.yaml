- release_tracks:
  - ALPHA
  auto_generated: false
  help_text:
    brief: List monitored events associated with a specific machine learning run.
    description: List monitored events associated with a specific machine learning run.
    examples: |-
      To list all monitored events for a machine learning run, run:

          $ {command} --location=us-central1 --machine-learning-run=my-run-123 --limit=1 --filter="type=PERFORMANCE_DEGRADATION AND start_time > '2026-05-18T10:00:00Z'" --sort-by="~start_time"

          Sample output:
          ```
            ---
            analyzerInsightFound: true
            displayName: performance-degradation-event
            name: projects/PROJECT_ID/locations/us-central1/machineLearningRuns/my-run-123/monitoredEvents/abc-123-def-456
            startTime: '2026-05-01T12:00:00Z'
            type: PERFORMANCE_DEGRADATION
          ```
  arguments:
    params:
    - help_text: |-
        Parent format:
        projects/{project}/locations/{location}/machineLearningRuns/{machineLearningRun}
      is_positional: false
      is_primary_resource: true
      resource_spec: !REF googlecloudsdk.command_lib.mldiagnostics.machine_learning_run.v1alpha_resources:projects_locations_machine_learning_runs
      required: true
  request:
    api_version: v1alpha
    collection:
    - hypercomputecluster.projects.locations.machineLearningRuns.monitoredEvents
  response:
    id_field: name
