- release_tracks: [GA]
  help_text:
    brief: Create a BigLake Delta Sharing catalog.
    description: |
      Create a BigLake Delta Sharing catalog.
  request:
    collection: biglake.deltasharing.v1.projects.catalogs
    api_version: delta_v1
    method: create
    modify_request_hooks:
    - googlecloudsdk.command_lib.biglake.delta_sharing:SetParentAndCatalogId
  arguments:
    resource:
      help_text: The Delta Sharing catalog to create.
      spec:
        name: catalog
        collection: biglake.deltasharing.v1.projects.catalogs
        request_id_field: deltaSharingCatalogId
        attributes:
        - attribute_name: project
          parameter_name: projectsId
          property: core/project
          help: The project of the catalog.
        - attribute_name: catalog
          parameter_name: catalogsId
          help: The Delta Sharing Catalog for the resource.
    params:
    - arg_name: location
      api_field: deltaSharingCatalog.location
      help_text: The location of the catalog.
      required: true
    - arg_name: refresh-interval
      api_field: deltaSharingCatalog.refreshOptions.refreshSchedule.refreshInterval
      help_text: The interval for refreshing metadata from the remote catalog (e.g. 300s or 5m).
      type: "googlecloudsdk.calliope.arg_parsers:Duration:"
      processor: googlecloudsdk.command_lib.biglake.delta_sharing:GetDurationString
    - arg_name: service-directory-name
      api_field: deltaSharingCatalog.federatedCatalogOptions.serviceDirectoryName
      help_text: The service directory resource name for private networking.
