release_tracks: [ALPHA]
help_text:
  brief: Update a regional multicast group producer activation.
  description: |
    Update a regional multicast group producer activation in the specified
    location of the current project.
  examples: |
    Update a regional multicast group producer activation with the name
    `my-rmgpa` and location `region`.

      $ {command} my-rmgpa --description="new description" --location=region
arguments:
  resource:
    spec: !REF googlecloudsdk.command_lib.network_services.resources:regionalMulticastGroupProducerActivation
    help_text: |
      Name of the regional multicast group producer activation to be updated.
  params:
  - arg_name: interconnect-attachments
    repeated: true
    clearable: true
    api_field: regionalMulticastGroupProducerActivation.interconnectAttachments
    help_text: The interconnect attachments to be used.
  - arg_name: description
    api_field: regionalMulticastGroupProducerActivation.description
    help_text: |
      The description for the regional multicast group producer activation.
  labels:
    api_field: regionalMulticastGroupProducerActivation.labels
update:
  read_modify_update: true
async:
  collection: networkservices.projects.locations.operations
request:
  ALPHA:
    api_version: v1alpha1
  collection: networkservices.projects.locations.regionalMulticastGroupProducerActivations
  method: patch
