release_tracks: [ALPHA]
help_text:
  brief: Update a regional multicast producer association.
  description: |
    Update a regional multicast producer association in the specified location
    of the current project.
  examples: |
    Update a regional multicast producer association with the name `my-rmpa`
    and location `region`.

      $ {command} my-rmpa --description="new description" --location=region
arguments:
  resource:
    spec: !REF googlecloudsdk.command_lib.network_services.resources:regionalMulticastProducerAssociation
    help_text: |
      Name of the regional multicast producer association to be updated.
  params:
  - arg_name: description
    api_field: regionalMulticastProducerAssociation.description
    help_text: The description for the regional multicast producer association.
  labels:
    api_field: regionalMulticastProducerAssociation.labels
update:
  read_modify_update: true
async:
  collection: networkservices.projects.locations.operations
request:
  ALPHA:
    api_version: v1alpha1
  collection: networkservices.projects.locations.regionalMulticastProducerAssociations
  method: patch
