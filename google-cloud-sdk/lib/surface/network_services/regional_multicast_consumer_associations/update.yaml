release_tracks: [ALPHA]
help_text:
  brief: Update a regional multicast consumer association.
  description: |
    Update a regional multicast consumer association in the specified location
    of the current project.
  examples: |
    Update a regional multicast consumer association with the name `my-rmca`
    and location `region`.

      $ {command} my-rmca --description="new description" --location=region
arguments:
  resource:
    spec: !REF googlecloudsdk.command_lib.network_services.resources:regionalMulticastConsumerAssociation
    help_text: |
      Name of the regional multicast consumer association to be updated.
  params:
  - arg_name: description
    api_field: regionalMulticastConsumerAssociation.description
    help_text: The description for the regional multicast consumer association.
  labels:
    api_field: regionalMulticastConsumerAssociation.labels
update:
  read_modify_update: true
async:
  collection: networkservices.projects.locations.operations
request:
  ALPHA:
    api_version: v1alpha1
  collection: networkservices.projects.locations.regionalMulticastConsumerAssociations
  method: patch
