release_tracks: [ALPHA]
help_text:
  brief: Update a regional multicast domain activation.
  description: |
    Update a regional multicast domain activation in the specified location
    of the current project.
  examples: |
    Update a regional multicast domain activation with the name `my-rmda`
    and location `region`.

      $ {command} my-rmda --description="new description" --location=region
arguments:
  resource:
    spec: !REF googlecloudsdk.command_lib.network_services.resources:regionalMulticastDomainActivation
    help_text: |
      Name of the regional multicast domain activation to be updated.
  params:
  - arg_name: description
    api_field: regionalMulticastDomainActivation.description
    help_text: The description for the regional multicast domain activation.
  labels:
    api_field: regionalMulticastDomainActivation.labels
update:
  read_modify_update: true
async:
  collection: networkservices.projects.locations.operations
request:
  ALPHA:
    api_version: v1alpha1
  collection: networkservices.projects.locations.regionalMulticastDomainActivations
  method: patch
