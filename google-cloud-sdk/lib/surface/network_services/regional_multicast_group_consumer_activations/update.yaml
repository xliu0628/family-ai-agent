release_tracks: [ALPHA]
help_text:
  brief: Update a regional multicast group consumer activation.
  description: |
    Update a regional multicast group consumer activation in the specified
    location of the current project.
  examples: |
    Update a regional multicast group consumer activation with the name
    `my-rmgca` and location `region`.

      $ {command} my-rmgca --enable-logging --location=region
arguments:
  resource:
    spec: !REF googlecloudsdk.command_lib.network_services.resources:regionalMulticastGroupConsumerActivation
    help_text: |
      Name of the regional multicast group consumer activation to be updated.
  params:
  - arg_name: interconnect-attachments
    repeated: true
    clearable: true
    api_field: regionalMulticastGroupConsumerActivation.interconnectAttachments
    help_text: The interconnect attachments to be used.
  - arg_name: enable-logging
    api_field: regionalMulticastGroupConsumerActivation.logConfig.enabled
    help_text: |
      Whether to enable logging for this regional multicast group consumer
      activation.
    action: store_true_false
  - arg_name: description
    api_field: regionalMulticastGroupConsumerActivation.description
    help_text: |
      The description for the regional multicast group consumer activation.
  labels:
    api_field: regionalMulticastGroupConsumerActivation.labels
update:
  read_modify_update: true
async:
  collection: networkservices.projects.locations.operations
request:
  ALPHA:
    api_version: v1alpha1
  collection: networkservices.projects.locations.regionalMulticastGroupConsumerActivations
  method: patch
