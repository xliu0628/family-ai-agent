$schema: "http://json-schema.org/draft-06/schema#"

title: datastream v1 SourceProperty export schema
description: A gcloud export/import command YAML validation schema.
type: object
required:
- propertyName
additionalProperties: false
properties:
  COMMENT:
    type: object
    description: User specified info ignored by gcloud import.
    additionalProperties: false
    properties:
      template-id:
        type: string
      region:
        type: string
      description:
        type: string
      date:
        type: string
      version:
        type: string
  UNKNOWN:
    type: array
    description: Unknown API fields that cannot be imported.
    items:
      type: string
  primaryKey:
    description: Whether or not the property is a primary key.
    type: boolean
  properties:
    description: |-
      Source properties. When specified, it means that the current property
      contains nested properties of its own. When unspecified as part of include
      objects, includes everything, when unspecified as part of exclude objects,
      excludes nothing.
    type: array
    items:
      $ref: SourceProperty.yaml
  propertyName:
    description: The property name.
    type: string
