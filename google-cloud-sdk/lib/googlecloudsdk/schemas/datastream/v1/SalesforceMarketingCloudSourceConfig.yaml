$schema: "http://json-schema.org/draft-06/schema#"

title: datastream v1 SalesforceMarketingCloudSourceConfig export schema
description: A gcloud export/import command YAML validation schema.
type: object
required:
- fullRefreshPollingInterval
- pollingInterval
additionalProperties: false
properties:
  COMMENT:
    type: object
    description: User specified info ignored by gcloud import.
    additionalProperties: false
    properties:
      template-id:
        type: string
      region:
        type: string
      description:
        type: string
      date:
        type: string
      version:
        type: string
  UNKNOWN:
    type: array
    description: Unknown API fields that cannot be imported.
    items:
      type: string
  excludeObjects:
    description: The objects to exclude from the stream.
    $ref: SourceCatalog.yaml
  fullRefreshPollingInterval:
    description: |-
      Specifies the polling interval for a full refresh of objects that do not
      support incremental sync. If not set, a default value of 24 hours is used.
      The duration must be between 1 and 24 hours, inclusive.
    type: string
  includeObjects:
    description: The objects to retrieve from the source.
    $ref: SourceCatalog.yaml
  pollingInterval:
    description: |-
      Incremental sync polling interval for all objects. If not set, a default
      value of `5 minutes` is used. The duration must be from `5 minutes` to `24
      hours`, inclusive.
    type: string
