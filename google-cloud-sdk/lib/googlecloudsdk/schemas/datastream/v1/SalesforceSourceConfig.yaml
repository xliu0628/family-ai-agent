$schema: "http://json-schema.org/draft-06/schema#"

title: datastream v1 SalesforceSourceConfig export schema
description: A gcloud export/import command YAML validation schema.
type: object
required:
- pollingInterval
additionalProperties: false
properties:
  COMMENT:
    type: object
    description: User specified info ignored by gcloud import.
    additionalProperties: false
    properties:
      template-id:
        type: string
      region:
        type: string
      description:
        type: string
      date:
        type: string
      version:
        type: string
  UNKNOWN:
    type: array
    description: Unknown API fields that cannot be imported.
    items:
      type: string
  excludeObjects:
    description: The Salesforce objects to exclude from the stream.
    $ref: SalesforceOrg.yaml
  includeObjects:
    description: The Salesforce objects to retrieve from the source.
    $ref: SalesforceOrg.yaml
  pollingInterval:
    description: |-
      Salesforce objects polling interval. The interval at which new changes
      will be polled for each object. The duration must be from `5 minutes` to
      `24 hours`, inclusive.
    type: string
